<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>Training</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273549; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#38bdf8; --green:#34d399; --amber:#fbbf24; --red:#f87171; --line:#334155;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); padding-bottom:40px}
  header{padding:16px 16px 8px; position:sticky; top:0; background:var(--bg); z-index:5}
  h1{font-size:1.15rem; margin:0 0 2px}
  .sub{color:var(--muted); font-size:.85rem}
  .tabs{display:flex; gap:6px; overflow-x:auto; padding:10px 16px 6px; scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto; border:1px solid var(--line); background:var(--card); color:var(--text);
       border-radius:12px; padding:8px 12px; font-size:.85rem; text-align:center; min-width:52px}
  .tab.active{background:var(--accent); color:#082f49; border-color:var(--accent); font-weight:600}
  .tab.done{border-color:var(--green)}
  .tab small{display:block; font-size:.7rem; opacity:.75}
  main{padding:8px 16px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px}
  .focus{font-size:1.05rem; font-weight:600; margin:0}
  .meta{color:var(--muted); font-size:.85rem; margin:4px 0 10px}
  .desc{font-size:.92rem; line-height:1.5; color:var(--text)}
  .exlist{margin:12px 0 0; padding:0; list-style:none}
  .ex{display:flex; justify-content:space-between; align-items:center; gap:8px;
      background:var(--card2); border-radius:12px; padding:12px; margin-bottom:8px; cursor:pointer}
  .ex .nm{font-weight:600; font-size:.95rem}
  .ex .dl{color:var(--muted); font-size:.8rem; margin-top:2px}
  .ex .wt{color:var(--accent); font-size:.85rem; white-space:nowrap}
  .ex .chev{color:var(--muted)}
  button.primary{width:100%; padding:14px; border:0; border-radius:14px; background:var(--accent);
      color:#082f49; font-size:1rem; font-weight:700; margin-top:6px}
  button.primary.done{background:var(--green)}
  button.ghost{background:none; border:1px solid var(--line); color:var(--text); border-radius:12px; padding:10px 14px}
  /* detail sheet */
  #sheetWrap{position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; z-index:20}
  #sheet{position:absolute; left:0; right:0; bottom:0; max-height:86%; overflow-y:auto; padding-top:20px;
         background:var(--card); border-radius:20px 20px 0 0; padding:20px 16px 30px}
  #sheet h2{margin:0 0 4px; font-size:1.1rem}
  .badge{display:inline-block; font-size:.72rem; background:var(--card2); color:var(--muted);
         border-radius:8px; padding:3px 8px; margin:0 6px 10px 0}
  .sec{font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:14px 0 4px}
  .illu{background:#eef6fb; border-radius:14px; margin:8px 0 2px; padding:4px}
  .illu svg{width:100%; height:auto; display:block}
  .switch{display:flex; gap:6px; margin-top:10px}
  .switch button{flex:1; padding:9px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--text); font-size:.9rem}
  .switch button.on{background:var(--accent); color:#082f49; font-weight:700; border-color:var(--accent)}
  .bar{height:10px; background:var(--card2); border-radius:6px; margin:10px 0 4px; overflow:hidden}
  .bar div{height:100%; border-radius:6px; transition:width .3s}
  .chips{display:flex; flex-wrap:wrap; gap:6px}
  .chip{background:var(--card2); border:1px solid var(--line); color:var(--text); border-radius:10px; padding:8px 10px; font-size:.82rem}
  .chip b{color:var(--accent); font-weight:700}
  .chip.on{border-color:var(--accent); color:var(--accent); font-weight:600}
  .xclose{position:absolute; top:12px; right:12px; background:var(--card2); border:0; color:var(--muted);
      font-size:1.05rem; padding:6px 11px; border-radius:10px}
  .entry{display:flex; align-items:center; gap:8px; background:var(--card2); border-radius:10px; padding:8px 10px; margin-top:6px; font-size:.88rem}
  .entry span:first-child{flex:1}
  .entry button{background:none; border:0; color:var(--muted); font-size:1rem; padding:2px 6px}
  .uitleg{font-size:.95rem; line-height:1.55}
  .logrow{display:flex; gap:8px; margin-top:8px}
  .logrow input{flex:1; background:var(--card2); border:1px solid var(--line); border-radius:12px;
      color:var(--text); padding:12px; font-size:1rem; min-width:0}
  .hist{font-size:.85rem; color:var(--muted); margin-top:6px}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--card2);
      border:1px solid var(--line); padding:10px 18px; border-radius:12px; font-size:.9rem; z-index:30;
      opacity:0; transition:opacity .25s}
  .toast.show{opacity:1}
  .queued{color:var(--amber)}
  /* setup */
  #setup{padding:24px 16px}
  #setup label{display:block; font-size:.85rem; color:var(--muted); margin:14px 0 4px}
  #setup input{width:100%; background:var(--card); border:1px solid var(--line); border-radius:12px;
      color:var(--text); padding:12px; font-size:1rem}
  .note{font-size:.8rem; color:var(--muted); line-height:1.5; margin-top:14px}
  .stoplicht{font-size:.8rem; color:var(--muted); line-height:1.6; padding:0 4px}
  .err{color:var(--red); font-size:.85rem; margin-top:10px}
</style>
</head>
<body>

<div id="setup" style="display:none">
  <h1>Instellen</h1>
  <p class="note">Eenmalig: koppel de app aan je privé GitHub-datarepo. Deze gegevens blijven alleen op dit toestel (localStorage).</p>
  <label>GitHub-gebruikersnaam</label><input id="cfgOwner" autocapitalize="none" autocorrect="off">
  <label>Naam datarepo (privé)</label><input id="cfgRepo" value="fitness-data" autocapitalize="none">
  <label>Fine-grained token (alleen toegang tot die repo, Contents read/write)</label>
  <input id="cfgToken" type="password" autocapitalize="none">
  <div id="setupErr" class="err"></div>
  <br><button class="primary" onclick="saveCfg()">Verbinden</button>
</div>

<div id="app" style="display:none">
  <header>
    <h1 id="titel">Training</h1>
    <div class="sub" id="periode"></div>
    <div class="switch">
      <button id="swT" class="on" onclick="setView('training')">Training</button>
      <button id="swE" onclick="setView('eiwit')">Voeding</button>
      <button id="swR" onclick="setView('trends')">Trends</button>
    </div>
  </header>
  <div class="tabs" id="tabs"></div>
  <main id="main"></main>
  <div class="stoplicht" id="stoplicht"></div>
  <main><button class="ghost" style="width:100%" onclick="refresh(true)">↻ Schema herladen</button></main>
</div>

<div id="sheetWrap" onclick="if(event.target===this)closeSheet()">
  <div id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const LS = localStorage;
const state = { schema:null, oef:null, voeding:null, trends:null, params:null, log:{entries:[]}, dagIdx:0, view:'training', voedingDag:null };

/* ---------- config ---------- */
function cfg(){ try{ return JSON.parse(LS.getItem('cfg'))||null }catch(e){ return null } }
function saveCfg(){
  const c = { owner:cfgOwner.value.trim(), repo:cfgRepo.value.trim(), token:cfgToken.value.trim() };
  if(!c.owner||!c.repo||!c.token){ setupErr.textContent='Vul alle velden in.'; return }
  LS.setItem('cfg', JSON.stringify(c));
  boot();
}

/* ---------- GitHub API ---------- */
function api(path, opts={}){
  const c = cfg();
  return fetch(`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${path}`, {
    cache: 'no-store',
    ...opts,
    headers: {
      'Authorization':'Bearer '+c.token,
      'Accept': opts.raw===false ? 'application/vnd.github+json' : 'application/vnd.github.raw+json',
      'X-GitHub-Api-Version':'2022-11-28',
      ...(opts.headers||{})
    }
  });
}
async function getJson(path){
  const r = await api(path);
  if(!r.ok) throw new Error(path+': HTTP '+r.status);
  return r.json();
}
async function putJson(path, obj, msg, poging=0){
  // sha ophalen (bestand kan nog niet bestaan)
  let sha;
  const r0 = await api(path, {raw:false});
  if(r0.ok) sha = (await r0.json()).sha;
  const body = { message: msg, content: b64(JSON.stringify(obj, null, 1)) };
  if(sha) body.sha = sha;
  const r = await api(path, {method:'PUT', raw:false, body: JSON.stringify(body)});
  if(!r.ok){
    if((r.status===409 || r.status===422) && poging<2) return putJson(path, obj, msg, poging+1);
    let det=''; try{ det=(await r.json()).message||'' }catch(e){}
    throw new Error('PUT '+path+': HTTP '+r.status+(det? ' — '+det:''));
  }
}
function b64(s){ return btoa(unescape(encodeURIComponent(s))) }

/* ---------- data laden ---------- */
async function refresh(force){
  try{
    const [schema, oef] = await Promise.all([ getJson('weekschema.json'), getJson('oefeningen.json') ]);
    state.schema = schema; state.oef = oef.oefeningen;
    LS.setItem('cache.schema', JSON.stringify(schema));
    LS.setItem('cache.oef', JSON.stringify(oef.oefeningen));
    try{ state.voeding = await getJson('voeding.json'); LS.setItem('cache.voeding', JSON.stringify(state.voeding)); }
    catch(e){ state.voeding = JSON.parse(LS.getItem('cache.voeding')||'null'); }
    try{ state.trends = await getJson('trends.json'); LS.setItem('cache.trends', JSON.stringify(state.trends)); }
    catch(e){ state.trends = JSON.parse(LS.getItem('cache.trends')||'null'); }
    try{ state.params = await getJson('parameters.json'); LS.setItem('cache.params', JSON.stringify(state.params)); }
    catch(e){ state.params = JSON.parse(LS.getItem('cache.params')||'null'); }
    let remote;
    try{ remote = await getJson('logs/'+schema.id+'.json') }
    catch(e){ remote = {schema:schema.id, entries:[]} }
    // lokaal bewaarde entries (cache, oude wachtrij, huidige sessie) samenvoegen — niets gaat verloren
    try{ const c=JSON.parse(LS.getItem('cache.log')); if(c && c.schema===schema.id) mergeEntries(remote.entries, c.entries); }catch(e){}
    try{ mergeEntries(remote.entries, JSON.parse(LS.getItem('queue'))||[]); }catch(e){}
    if(state.log && state.log.schema===schema.id) mergeEntries(remote.entries, state.log.entries);
    state.log = remote;
    LS.setItem('cache.log', JSON.stringify(state.log));
    await flushQueue();
    render(); if(force) toast('Schema bijgewerkt');
  }catch(e){
    // offline of fout → cache gebruiken
    const s = LS.getItem('cache.schema');
    if(s){ state.schema=JSON.parse(s); state.oef=JSON.parse(LS.getItem('cache.oef')||'{}');
           state.voeding=JSON.parse(LS.getItem('cache.voeding')||'null');
           state.trends=JSON.parse(LS.getItem('cache.trends')||'null');
           state.params=JSON.parse(LS.getItem('cache.params')||'null');
           state.log=JSON.parse(LS.getItem('cache.log')||'{"entries":[]}');
           render(); toast('Offline — cache gebruikt'); }
    else if(String(e).includes('401')||String(e).includes('404')){
      LS.removeItem('cfg'); boot(); setupErr.textContent='Verbinding mislukt ('+e.message+'). Controleer gegevens/token.';
    } else { toast('Kan schema niet laden'); }
  }
}

/* ---------- loggen (offline-bestendig: lokaal log = bron, sync = samenvoegen) ---------- */
function mergeEntries(base, extra){
  const key=x=>x.ts+'|'+x.type+'|'+(x.oefening||x.item||x.param||x.ref||'');
  const seen=new Set(base.map(key));
  (extra||[]).forEach(x=>{ if(x&&x.ts&&!seen.has(key(x))){ base.push(x); seen.add(key(x)); } });
  return base;
}
function addEntry(entry){
  entry.ts = new Date().toISOString();
  state.log.entries.push(entry);
  LS.setItem('cache.log', JSON.stringify(state.log));
  flushQueue();
}
let flushing=false, flushAgain=false;
async function flushQueue(){
  if(flushing){ flushAgain=true; return }
  if(!state.schema || !cfg()){ return }
  flushing=true;
  try{
    let remote;
    try{ remote = await getJson('logs/'+state.schema.id+'.json') }
    catch(e){ remote = {schema:state.schema.id, entries:[]} }
    const voor = remote.entries.length;
    mergeEntries(remote.entries, state.log.entries);
    if(remote.entries.length > voor){
      await putJson('logs/'+state.schema.id+'.json', remote, 'App-log '+new Date().toISOString().slice(0,16));
      toast('Opgeslagen ✓');
    }
    state.log = remote; LS.setItem('cache.log', JSON.stringify(remote));
    LS.setItem('queue','[]');
  }catch(e){ toast('Sync-fout: '+((e&&e.message)||e), true, 6000) }
  flushing=false;
  if(flushAgain){ flushAgain=false; flushQueue(); }
}

/* ---------- helpers ---------- */
function rondeEntries(id){
  const ann=annulled();
  return state.log.entries.filter(x=>x.type==='ronde'&&x.oefening===id&&!ann.has(x.ts));
}
function laatsteKg(id){
  const ann=annulled();
  const es=state.log.entries.filter(x=>!ann.has(x.ts)&&x.oefening===id&&(x.type==='gewicht'||x.type==='ronde')&&x.gewicht!=null);
  return es.length? es[es.length-1].gewicht : null;
}
function laatsteGewicht(oefId){
  const ann=annulled();
  const es=state.log.entries.filter(x=>!ann.has(x.ts)&&x.oefening===oefId&&(x.type==='gewicht'||x.type==='ronde')&&x.gewicht!=null);
  const e=es[es.length-1];
  if(e) return e.gewicht+' kg ('+e.datum.slice(5)+')';
  const dag = state.schema.dagen.find(d=>(d.oefeningen||[]).some(o=>o.id===oefId&&o.vorigGewicht));
  if(dag){ const o=dag.oefeningen.find(o=>o.id===oefId); if(o.vorigGewicht) return o.vorigGewicht+' kg (vorige week)' }
  return null;
}
function sessieGedaan(datum){ const ann=annulled(); return state.log.entries.some(x=>x.type==='sessie'&&x.datum===datum&&!ann.has(x.ts)) }
function localDate(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function vandaagIdx(){
  const t = localDate();
  const i = state.schema.dagen.findIndex(d=>d.datum===t);
  return i>=0 ? i : 0;
}
function setView(v){ state.view=v; render(); }

/* ---------- render ---------- */
const DAGEN = {ma:'Ma',di:'Di',wo:'Wo',do:'Do',vr:'Vr',za:'Za',zo:'Zo'};
function render(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  periode.textContent = state.schema.periode + (state.schema.locatie? ' · '+state.schema.locatie:'');
  document.getElementById('swT').className = state.view==='training'?'on':'';
  document.getElementById('swE').className = state.view==='eiwit'?'on':'';
  document.getElementById('swR').className = state.view==='trends'?'on':'';
  tabs.style.display = state.view==='training' ? 'flex':'none';
  stoplicht.style.display = state.view==='training' ? 'block':'none';
  stoplicht.textContent = state.schema.stoplicht||'';
  if(state.view==='eiwit'){ renderEiwit(); return; }
  if(state.view==='trends'){ renderTrends(); return; }
  tabs.innerHTML='';
  state.schema.dagen.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===state.dagIdx?' active':'')+(sessieGedaan(d.datum)?' done':'');
    b.innerHTML = DAGEN[d.dag]+' <small>'+d.datum.slice(8)+'/'+d.datum.slice(5,7)+(sessieGedaan(d.datum)?' ✓':'')+'</small>';
    b.onclick=()=>{state.dagIdx=i; render()};
    tabs.appendChild(b);
  });
  const d = state.schema.dagen[state.dagIdx];
  let h = `<div class="card">
    <p class="focus">${d.focus}</p>
    <div class="meta">${d.duur}${d.reeks? ' · '+d.reeks:''}</div>
    <div class="desc">${d.beschrijving}</div>`;
  if(d.rust) h+=`<div class="hist">⏱ ${d.rust}</div>`;
  if((d.oefeningen||[]).length){
    h+='<ul class="exlist">';
    d.oefeningen.forEach(o=>{
      const ex = state.oef[o.id]||{naam:o.id};
      const lg = ex.logGewicht ? laatsteGewicht(o.id) : null;
      h+=`<li class="ex" onclick="openSheet('${o.id}','${d.datum}')">
        <div><div class="nm">${ex.naam}</div><div class="dl">${o.doel||''}${o.opm? ' · '+o.opm:''}</div></div>
        <div class="wt">${lg||''}</div><div class="chev">›</div></li>`;
    });
    h+='</ul>';
  }
  const done = sessieGedaan(d.datum);
  h+=`<button class="primary${done?' done':''}" onclick="vink('${d.datum}')">${done?'✓ Sessie gedaan':'Sessie afvinken'}</button></div>`;
  main.innerHTML=h;
}
/* ---------- eiwit ---------- */
function annulled(){ return new Set(state.log.entries.filter(x=>x.type==='annuleer').map(x=>x.ref)); }
function eiwitOpDag(d){
  const ann=annulled();
  return state.log.entries.filter(x=>x.type==='eiwit'&&x.datum===d&&!ann.has(x.ts));
}
function stapVoedingDag(n){
  const dagen=state.schema.dagen.map(d=>d.datum);
  const i=dagen.indexOf(state.voedingDag)+n;
  if(i>=0&&i<dagen.length){ state.voedingDag=dagen[i]; render(); }
}
function vindItem(id){
  let it=null;
  ((state.voeding&&state.voeding.groepen)||[]).forEach(g=>g.items.forEach(i=>{ if(i.id===id) it=i; }));
  return it;
}
function renderEiwit(){
  const doel=state.schema.eiwitDoel||130;
  const kdoel=state.schema.kcalDoel||2200;
  if(!state.voedingDag) state.voedingDag=localDate();
  const dagen=state.schema.dagen.map(d=>d.datum);
  if(!dagen.includes(state.voedingDag)) state.voedingDag=dagen.includes(localDate())? localDate() : dagen[0];
  const vd=state.voedingDag, di=dagen.indexOf(vd);
  const es=eiwitOpDag(vd);
  const tot=Math.round(es.reduce((s,x)=>s+(x.eiwit||0),0));
  const ktot=Math.round(es.reduce((s,x)=>s+(x.kcal||0),0));
  const unk=es.filter(x=>x.eiwit==null).length;
  const kunk=es.filter(x=>x.kcal==null).length;
  const pct=Math.min(100, tot/doel*100);
  const kpct=Math.min(100, ktot/kdoel*100);
  const kleur= tot>=doel*0.9 ? 'var(--green)' : 'var(--accent)';
  const kkleur= ktot>kdoel ? 'var(--red)' : (ktot>kdoel*0.9? 'var(--amber)':'var(--accent)');
  let h=`<div class="card">
    <div class="logrow" style="margin:0 0 8px">
      <button class="ghost" type="button" ${di<=0?'disabled':''} onclick="stapVoedingDag(-1)">‹</button>
      <div style="flex:1;text-align:center;align-self:center;font-weight:600">${vd===localDate()? 'Vandaag':''} ${vd.slice(8)}/${vd.slice(5,7)}</div>
      <button class="ghost" type="button" ${di>=dagen.length-1?'disabled':''} onclick="stapVoedingDag(1)">›</button>
    </div>
    <div class="meta">doel ${doel} g eiwit · max ${kdoel} kcal</div>
    <div style="font-size:2rem;font-weight:700">${tot} <span style="font-size:1rem;color:var(--muted)">/ ${doel} g eiwit${unk? ' (+'+unk+' te schatten)':''}</span></div>
    <div class="bar"><div style="width:${pct}%;background:${kleur}"></div></div>
    <div style="font-size:1.4rem;font-weight:700;margin-top:10px">${ktot} <span style="font-size:.95rem;color:var(--muted)">/ ${kdoel} kcal${kunk? ' (+'+kunk+' te schatten)':''}</span></div>
    <div class="bar"><div style="width:${kpct}%;background:${kkleur}"></div></div>`;
  if(es.length){
    h+='<div class="sec">Gelogd op deze dag</div>';
    es.slice().reverse().forEach(e=>{
      h+=`<div class="entry"><span>${e.naam}${e.gram? ' · '+e.gram+' g':''}</span><span>${e.eiwit!=null? (e.geschat?'≈':'')+e.eiwit+' g':'?'}${e.kcal!=null? ' · '+e.kcal+' kcal':''}</span><button onclick="annuleer('${e.ts}')">✕</button></div>`;
    });
  }
  h+='</div><div class="card"><p class="focus">Snel toevoegen</p><div class="meta">Tik een item en pas het gewicht aan</div>';
  ((state.voeding&&state.voeding.groepen)||[]).forEach(g=>{
    h+=`<div class="sec">${g.naam}</div><div class="chips">`;
    g.items.forEach(i=>{
      const ind=Math.round(i.eiwitPer100g*i.portieGram/100);
      h+=`<button class="chip" onclick="openEiwitSheet('${i.id}')">${i.naam} <b>~${ind}</b></button>`;
    });
    h+='</div>';
  });
  h+=`<div class="sec">Iets anders</div>
    <div class="logrow"><input id="vNaam" placeholder="wat at je? bv. omelet"></div>
    <div class="logrow"><input id="vGewicht" type="number" inputmode="decimal" placeholder="gewicht (g)">
    <input id="vPer100" type="number" inputmode="decimal" placeholder="eiwit /100 g"></div>
    <div class="logrow"><input id="vKcal100" type="number" inputmode="decimal" placeholder="kcal /100 g">
    <input id="vEiwit" type="number" inputmode="decimal" placeholder="of eiwit totaal (g)"></div>
    <div class="logrow"><button class="ghost" style="flex:1" onclick="addEiwitVrij()">Toevoegen</button></div>
    <div class="hist">Eiwit /100 g staat op de verpakking; met gewicht erbij rekent de app zelf. Alles leeg? Dan telt het als "te schatten" tot Claude het 's nachts invult, en komt het item in je tik-lijst.</div></div>`;
  main.innerHTML=h;
}
function topGewichten(id, it){
  const telling={};
  ((it.gewichten)||[]).forEach((g,i)=>{ telling[g]=(telling[g]||0)+(0.5-i*0.1); }); // historiek (nachtelijke taak), licht gewogen
  const ann=annulled();
  state.log.entries.filter(x=>x.type==='eiwit'&&x.item===id&&x.gram&&!ann.has(x.ts))
    .forEach(x=>{ telling[x.gram]=(telling[x.gram]||0)+1; });
  return Object.entries(telling).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>parseFloat(x[0]));
}
function openEiwitSheet(id){
  const it=vindItem(id); if(!it) return;
  const top=topGewichten(id, it);
  const standaard = top.length? top[0] : it.portieGram; // meest ingegeven gewicht als default
  let chips='';
  if(top.length) chips='<div class="chips" style="margin:8px 0 0">'+top.map(g=>
    `<button type="button" class="chip" onclick="zetGram(${g})">${g} g</button>`).join('')+'</div>';
  sheet.innerHTML=`<button class="xclose" type="button" onclick="closeSheet()">✕</button>
    <h2>${it.naam}</h2>
    <span class="badge">${it.eiwitPer100g} g eiwit / 100 g</span>${it.kcalPer100g!=null? '<span class="badge">'+it.kcalPer100g+' kcal / 100 g</span>':''}
    <div class="sec">Gewicht (g)</div>
    <div class="logrow"><input id="gIn" type="number" inputmode="numeric" value="${standaard}">
    <button class="ghost" type="button" onclick="zetGram(${it.portieGram})">portie</button></div>
    ${chips}
    <div class="hist" id="gPrev"></div>
    <br><button class="primary" type="button" onclick="bevestigEiwit('${id}')">Toevoegen</button>
    <button class="ghost" type="button" style="width:100%;margin-top:8px" onclick="closeSheet()">Annuleren</button>`;
  sheetWrap.style.display='block';
  const upd=()=>{ const g=parseFloat(document.getElementById('gIn').value)||0;
    document.getElementById('gPrev').textContent='= '+Math.round(g*it.eiwitPer100g/100)+' g eiwit'+(it.kcalPer100g!=null? ' · '+Math.round(g*it.kcalPer100g/100)+' kcal':''); };
  document.getElementById('gIn').addEventListener('input',upd); upd();
}
function zetGram(g){ const el=document.getElementById('gIn'); el.value=g; el.dispatchEvent(new Event('input')); }
function bevestigEiwit(id){
  const it=vindItem(id);
  const g=parseFloat(document.getElementById('gIn').value);
  if(!g||g<=0){ toast('Geef een gewicht in'); return }
  const entry={type:'eiwit', datum:(state.voedingDag||localDate()), item:id, naam:it.naam, gram:g, eiwit:Math.round(g*it.eiwitPer100g/100)};
  if(it.kcalPer100g!=null) entry.kcal=Math.round(g*it.kcalPer100g/100);
  addEntry(entry);
  closeSheet(); render();
}
function addEiwitVrij(){
  const n=document.getElementById('vNaam').value.trim();
  if(!n){ toast('Geef een omschrijving'); return }
  const g=parseFloat(document.getElementById('vGewicht').value);
  const p=parseFloat(document.getElementById('vPer100').value);
  const t=parseFloat(document.getElementById('vEiwit').value);
  if(!isNaN(p)&&isNaN(g)){ toast('Geef ook het gewicht in bij /100 g'); return }
  let eiwit=null;
  if(!isNaN(p)&&!isNaN(g)) eiwit=Math.round(g*p/100);
  else if(!isNaN(t)) eiwit=t;
  const entry={type:'eiwit', datum:(state.voedingDag||localDate()), naam:n, gram:isNaN(g)?null:g, eiwit:eiwit};
  if(!isNaN(p)) entry.eiwitPer100g=p;
  const k=parseFloat(document.getElementById('vKcal100').value);
  if(!isNaN(k)){ entry.kcalPer100g=k; if(!isNaN(g)) entry.kcal=Math.round(g*k/100); }
  addEntry(entry);
  render();
}
function annuleer(ts){ addEntry({type:'annuleer', datum:localDate(), ref:ts}); render(); }

/* ---------- trends ---------- */
function spark(punten, opts={}){
  if(!punten.length) return '<div class="hist">nog geen data</div>';
  const W=300,H=110,P=16;
  const ys=punten.map(p=>p.y);
  let min=Math.min(...ys), max=Math.max(...ys);
  if(opts.doel!=null){ min=Math.min(min,opts.doel); max=Math.max(max,opts.doel); }
  if(max-min<1) max=min+1;
  const pad=(max-min)*0.12; min-=pad; max+=pad;
  const X=i=>punten.length>1? P+i*(W-2*P)/(punten.length-1) : W/2;
  const Y=v=>H-P-(v-min)*(H-2*P)/(max-min);
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">`;
  if(opts.doel!=null) s+=`<line x1="${P}" y1="${Y(opts.doel).toFixed(1)}" x2="${W-P}" y2="${Y(opts.doel).toFixed(1)}" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="4 4"/>
    <text x="${W-P}" y="${(Y(opts.doel)-4).toFixed(1)}" fill="var(--green)" font-size="9" text-anchor="end">doel ${opts.doel}</text>`;
  if(punten.length>1){
    const pts=punten.map((p,i)=>X(i).toFixed(1)+','+Y(p.y).toFixed(1)).join(' ');
    s+=`<polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  }
  punten.forEach((p,i)=>{ s+=`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.y).toFixed(1)}" r="3.5" fill="var(--accent)"/>`; });
  const f=punten[0], l=punten[punten.length-1];
  s+=`<text x="${P}" y="${H-2}" fill="var(--muted)" font-size="9">${f.l||''}</text>
    <text x="${W-P}" y="${H-2}" fill="var(--muted)" font-size="9" text-anchor="end">${l.l||''}</text>
    <text x="${X(punten.length-1).toFixed(1)}" y="${(Y(l.y)-8).toFixed(1)}" fill="var(--text)" font-size="10" text-anchor="end">${l.y}</text></svg>`;
  return s;
}
function dl(d){ return d.slice(8)+'/'+d.slice(5,7); }
function renderTrends(){
  const tr=state.trends||{}; const ann=annulled();
  // parameters (gewicht, VO2max, ...)
  const plist=((state.params&&state.params.parameters)||[{id:'gewicht',naam:'Gewicht',eenheid:'kg',doel:90,beter:'lager'}]);
  let h='';
  plist.forEach(pa=>{
    const hist=(((tr.parameters||{})[pa.id])||{}).punten||[];
    let extra=[];
    if(pa.id==='gewicht') extra=((tr.gewicht&&tr.gewicht.punten)||[]).map(p=>({d:p.d,v:p.kg}));
    const seen=new Set(hist.concat(extra).map(p=>p.d));
    const lm={};
    state.log.entries.filter(x=>!ann.has(x.ts)&&((x.type==='parameter'&&x.param===pa.id)||(pa.id==='gewicht'&&x.type==='lichaamsgewicht')))
      .forEach(x=>{ lm[x.datum]=(x.waarde!=null?x.waarde:x.kg); });
    const live=Object.keys(lm).filter(d=>!seen.has(d)).map(d=>({d,v:lm[d]}));
    const reeks=hist.concat(extra,live).sort((a,b)=>a.d<b.d?-1:1);
    h+=`<div class="card"><p class="focus">${pa.naam}</p>
      <div class="meta">${reeks.length? 'laatste: '+reeks[reeks.length-1].v+' '+pa.eenheid:'nog geen meting'}${pa.doel!=null? ' · doel '+pa.doel+' '+pa.eenheid:''}</div>
      ${spark(reeks.map(p=>({y:p.v,l:dl(p.d)})),{doel:pa.doel})}
      <div class="logrow"><input id="pIn-${pa.id}" type="number" inputmode="decimal" step="0.1" placeholder="${pa.eenheid}">
      <button class="ghost" onclick="logParam('${pa.id}')">Opslaan</button></div>
      ${pa.tip? '<div class="hist">'+pa.tip+'</div>':''}</div>`;
  });
  // eiwit per dag
  const histE=(tr.eiwit&&tr.eiwit.punten)||[];
  const eseen=new Set(histE.map(p=>p.d));
  const perDag={};
  state.log.entries.filter(x=>x.type==='eiwit'&&!ann.has(x.ts)&&x.eiwit!=null).forEach(x=>{ perDag[x.datum]=(perDag[x.datum]||0)+x.eiwit; });
  const liveE=Object.keys(perDag).filter(d=>!eseen.has(d)).map(d=>({d,g:Math.round(perDag[d])}));
  const eiw=histE.concat(liveE).sort((a,b)=>a.d<b.d?-1:1).slice(-14);
  h+=`<div class="card"><p class="focus">Eiwit per dag</p><div class="meta">laatste 14 dagen</div>
    ${spark(eiw.map(p=>({y:p.g,l:dl(p.d)})),{doel:state.schema.eiwitDoel||130})}</div>`;
  // calorieën per dag
  const histK=(tr.kcal&&tr.kcal.punten)||[];
  const kzien=new Set(histK.map(p=>p.d));
  const perDagK={};
  state.log.entries.filter(x=>x.type==='eiwit'&&!ann.has(x.ts)&&x.kcal!=null).forEach(x=>{ perDagK[x.datum]=(perDagK[x.datum]||0)+x.kcal; });
  const liveK=Object.keys(perDagK).filter(d=>!kzien.has(d)).map(d=>({d,g:Math.round(perDagK[d])}));
  const kcalR=histK.concat(liveK).sort((a,b)=>a.d<b.d?-1:1).slice(-14);
  h+=`<div class="card"><p class="focus">Calorieën per dag</p><div class="meta">laatste 14 dagen</div>
    ${spark(kcalR.map(p=>({y:p.g,l:dl(p.d)})),{doel:state.schema.kcalDoel||2200})}</div>`;
  // krachtprogressie
  h+='<div class="card"><p class="focus">Krachtprogressie</p>';
  const kr={};
  Object.entries(tr.kracht||{}).forEach(([id,v])=>{ kr[id]={naam:v.naam,punten:v.punten.slice()}; });
  state.log.entries.filter(x=>(x.type==='gewicht'||(x.type==='ronde'&&x.gewicht!=null))&&!ann.has(x.ts)).forEach(x=>{
    const naam=(state.oef[x.oefening]||{}).naam||x.oefening;
    kr[x.oefening]=kr[x.oefening]||{naam,punten:[]};
    if(!kr[x.oefening].punten.some(p=>p.d===x.datum&&p.kg===x.gewicht)) kr[x.oefening].punten.push({d:x.datum,kg:x.gewicht});
  });
  const ids=Object.keys(kr);
  if(!ids.length) h+='<div class="hist">Log gewichten bij je oefeningen — hier verschijnt je progressie.</div>';
  ids.forEach(id=>{
    const v=kr[id]; v.punten.sort((a,b)=>a.d<b.d?-1:1);
    const l=v.punten[v.punten.length-1];
    h+=`<div class="sec">${v.naam} — ${l.kg} kg</div>`;
    h+= v.punten.length>1? spark(v.punten.map(p=>({y:p.kg,l:dl(p.d)}))) : '<div class="hist">1 meting — grafiek volgt bij de volgende</div>';
  });
  h+='</div>';
  // weekoverzicht (vult de nachtelijke taak)
  const ses=(tr.sessies&&tr.sessies.punten)||[], lop=(tr.lopen&&tr.lopen.punten)||[];
  h+='<div class="card"><p class="focus">Weekoverzicht</p>';
  h+= ses.length? '<div class="sec">Sessies gedaan per week</div>'+spark(ses.map(p=>({y:p.gedaan,l:p.week.slice(5)}))) :
    '<div class="hist">Sessietrouw en loopvolume verschijnen na de eerste weekafsluiting (zondagnacht).</div>';
  if(lop.length) h+='<div class="sec">Loopvolume (km/week)</div>'+spark(lop.map(p=>({y:p.km,l:p.week.slice(5)})));
  h+='</div>';
  main.innerHTML=h;
}
function logParam(id){
  const v=parseFloat(document.getElementById('pIn-'+id).value);
  if(isNaN(v)){ toast('Geef een waarde in'); return }
  addEntry({type:'parameter', param:id, datum:localDate(), waarde:v});
  render();
}

function vink(datum){
  const ann=annulled();
  const s=state.log.entries.find(x=>x.type==='sessie'&&x.datum===datum&&!ann.has(x.ts));
  if(s){ addEntry({type:'annuleer', datum, ref:s.ts}); toast('Afvinken ongedaan gemaakt'); render(); return }
  addEntry({type:'sessie', datum, status:'gedaan'});
  render();
}

/* ---------- detail sheet (oefening + rondes) ---------- */
let curEx=null, curDatum=null, curVariant=null;
function fmtRonde(r, ex){
  let s='R'+(r.ronde||'?')+': ';
  if(r.reps!=null) s+=r.reps+((ex.meting==='sec')?' sec':'×');
  if(r.variant) s+=' '+r.variant;
  if(r.gewicht!=null) s+=' @'+r.gewicht+' kg';
  return s;
}
function gekozenVariant(id){
  if(curVariant) return curVariant;
  const rs=rondeEntries(id).filter(r=>r.variant);
  return rs.length? rs[rs.length-1].variant : null;
}
function kiesVariant(el,v){
  curVariant=v;
  el.parentNode.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
}
function openSheet(id, datum){
  curEx=id; curDatum=datum; curVariant=null;
  renderOefSheet();
  sheetWrap.style.display='block';
}
function renderOefSheet(){
  const id=curEx, datum=curDatum;
  const ex=state.oef[id]; if(!ex) return;
  const meting=ex.meting||'reps';
  const rondes=rondeEntries(id);
  const vandaag=rondes.filter(r=>r.datum===datum);
  const vDatums=[...new Set(rondes.filter(r=>r.datum<datum).map(r=>r.datum))].sort();
  const vDag=vDatums[vDatums.length-1];
  let h=`<button class="xclose" type="button" onclick="closeSheet()">✕</button>
    <h2>${ex.naam}</h2>
    <span class="badge">${ex.patroon}</span><span class="badge">${ex.materiaal}</span>
    ${ex.svg? '<div class="illu">'+ex.svg+'</div>':''}
    <div class="sec">Uitvoering</div><div class="uitleg">${ex.uitleg}</div>
    <div class="sec">Progressie</div><div class="uitleg">${ex.progressie}</div>`;
  if(meting!=='geen'){
    if(vDag){
      const vorige=rondes.filter(r=>r.datum===vDag);
      h+=`<div class="sec">Vorige keer (${vDag.slice(8)}/${vDag.slice(5,7)})</div><div class="hist">${vorige.map(r=>fmtRonde(r,ex)).join(' · ')}</div>`;
    } else {
      const lg=laatsteGewicht(id);
      if(lg) h+=`<div class="sec">Vorige keer</div><div class="hist">${lg}</div>`;
    }
    if(vandaag.length){
      h+='<div class="sec">Vandaag</div>';
      vandaag.forEach(r=>{ h+=`<div class="entry"><span>${fmtRonde(r,ex)}</span><button type="button" onclick="annuleerRonde('${r.ts}')">✕</button></div>`; });
    }
    const nr=vandaag.length+1;
    h+=`<div class="sec">Ronde ${nr} loggen</div>
      <div class="logrow">
        <input id="rIn" type="number" inputmode="numeric" placeholder="${meting==='sec'?'seconden':'aantal herhalingen'}">`;
    if(ex.logGewicht){
      const kg=laatsteKg(id);
      h+=`<input id="rKg" type="number" inputmode="decimal" step="0.5" placeholder="kg"${kg? ' value="'+kg+'"':''}>`;
    }
    h+='</div>';
    if(ex.varianten && ex.varianten.length){
      const gv=gekozenVariant(id);
      h+='<div class="chips" style="margin-top:8px">'+ex.varianten.map(v=>
        `<button type="button" class="chip${v===gv?' on':''}" onclick="kiesVariant(this,'${v}')">${v}</button>`).join('')+'</div>';
    }
    h+=`<button class="primary" type="button" onclick="logRonde()">Ronde ${nr} opslaan</button>
      <div class="hist">⏱ Rust 60–90 sec voor je aan de volgende ronde begint.</div>`;
  }
  h+='<button class="ghost" type="button" style="width:100%;margin-top:10px" onclick="closeSheet()">Sluiten</button>';
  sheet.innerHTML=h;
}
function logRonde(){
  const ex=state.oef[curEx]; const meting=ex.meting||'reps';
  const n=parseFloat(document.getElementById('rIn').value);
  if(isNaN(n)||n<=0){ toast(meting==='sec'?'Geef het aantal seconden in':'Geef het aantal herhalingen in'); return }
  const entry={type:'ronde', datum:curDatum, oefening:curEx,
    ronde:rondeEntries(curEx).filter(r=>r.datum===curDatum).length+1, reps:n};
  const kgEl=document.getElementById('rKg');
  if(kgEl){ const kg=parseFloat(kgEl.value); if(!isNaN(kg)&&kg>0) entry.gewicht=kg; }
  const v=gekozenVariant(curEx);
  if(ex.varianten && v) entry.variant=v;
  addEntry(entry);
  renderOefSheet(); render();
}
function annuleerRonde(ts){ addEntry({type:'annuleer', datum:curDatum, ref:ts}); renderOefSheet(); render(); }
function closeSheet(){ sheetWrap.style.display='none' }

/* ---------- toast ---------- */
let toastT;
function toast(msg, warn, duur){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.toggle('queued',!!warn); t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'), duur||2500);
}

/* ---------- start ---------- */
function boot(){
  if(!cfg()){ document.getElementById('app').style.display='none';
    document.getElementById('setup').style.display='block'; return }
  refresh().then(()=>{ if(state.schema){ state.dagIdx=vandaagIdx(); render(); } });
}
boot();
window.addEventListener('online', flushQueue);
setInterval(flushQueue, 60000);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
